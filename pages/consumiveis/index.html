<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./vars.css">
  <link rel="stylesheet" href="./style.css">
  
  
  <style>
   a,
   button,
   input,
   select,
   h1,
   h2,
   h3,
   h4,
   h5,
   * {
       box-sizing: border-box;
       margin: 0;
       padding: 0;
       border: none;
       text-decoration: none;
       background: none;
   
       -webkit-font-smoothing: antialiased;
   }
   
   menu, ol, ul {
       list-style-type: none;
       margin: 0;
       padding: 0;
   }
   </style>
  <title>Document</title>
</head>
<body>
  <div class="logup-form">
    <div class="navbar">
      <img class="back-button" src="back-button0.svg" />
      <img class="logo" src="logo0.svg" />
      <img class="help-button" src="help-button0.svg" />
    </div>
    <div class="conteudo">
      <div class="titulo-conteudo">
        <div class="subtitulo-texto">crie o seu perfil</div>
      </div>
      <div class="formulario-cadastrar">
        <div class="campo-imagem">
          <div class="imagem-texto">Imagem:</div>
          <img class="button-save" src="button-save0.svg" />
          <div class="nome-texto">Upload</div>
        </div>
        <div class="campo-nome">
          <div class="nome-texto2">Nome:</div>
          <div class="nome-input">
            <div class="nome-texto3">FirstName LastName</div>
            <img class="cancelar-botao" src="cancelar-botao0.svg" />
          </div>
        </div>
        <div class="campo-email">
          <div class="email-texto">E-mail:</div>
          <div class="email-input">
            <div class="email-texto2">exemplo@escola.gov.br</div>
            <img class="cancelar-botao2" src="cancelar-botao1.svg" />
          </div>
        </div>
        <div class="campo-senha">
          <div class="senha-texto">
            <span>
              <span class="senha-texto-span">Senha</span>
              <span class="senha-texto-span2">:</span>
            </span>
          </div>
          <div class="senha-input">
            <div class="senha-texto2">***********</div>
            <img class="cancelar-botao3" src="cancelar-botao2.svg" />
          </div>
        </div>
        <div class="campo-confirmar">
          <div class="senha-texto3">
            <span>
              <span class="senha-texto-3-span">Confirmar senha</span>
              <span class="senha-texto-3-span2">:</span>
            </span>
          </div>
          <div class="senha-input">
            <div class="senha-texto2">***********</div>
            <img class="cancelar-botao4" src="cancelar-botao3.svg" />
          </div>
        </div>
        <div class="campo-cep">
          <div class="senha-texto4">Código Postal</div>
          <div class="senha-input">
            <div class="senha-texto2">01234-567</div>
            <img class="cancelar-botao5" src="cancelar-botao4.svg" />
          </div>
        </div>
        <div class="botao-acao">
          <div class="botao-cadastrar">
            <div class="formato-botao"></div>
            <div class="cadastrar-texto">Cadastrar</div>
          </div>
        </div>
      </div>
      <div class="adicionais">
        <div class="link-entrar">
          <div class="link-texto">Já possui conta?</div>
        </div>
        <div class="oauth-2">
          <div class="botao-microsoft">
            <img class="microsoft-icone" src="microsoft-icone0.png" />
          </div>
          <div class="botao-google">
            <img class="google-icone" src="google-icone0.png" />
          </div>
        </div>
      </div>
    </div>
  </div>
  
</body>
</html>
